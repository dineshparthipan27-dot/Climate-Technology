<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Your Website Title Here">
    <meta property="og:description" content="Join our premium online learning platform and upgrade your skills today.">
    <meta property="og:image" content="https://yourwebsite.com/asset/preview-image.jpg">
    <meta property="og:url" content="https://yourwebsite.com">
    <meta property="og:type" content="website">
    <meta name="description"
        content="Join our premium online learning platform. Access interactive courses, live community zones, and expert tutors to upgrade your skills today.">

    <title> Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(10, 25, 47, 0.75);
            --primary-orange: #16a34a;
            --orange-glow: rgba(15, 169, 25, 0.4);
            --text-white: #ffffff;
            --text-light: #ccd6f6;
            --error-red: #ff4d4d;
            --input-bg: rgba(255, 255, 255, 0.05);
            --border-light: rgba(204, 214, 246, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body,
        html {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
            background-color: var(--bg-color);
        }

        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 25, 47, 0.85);
            z-index: -1;
        }

        .back-home-btn {
            position: absolute;
            top: 25px;
            left: 25px;
            background: var(--glass-bg);
            color: var(--primary-orange);
            padding: 10px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid var(--primary-orange);
            transition: all 0.3s ease;
            z-index: 10;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .back-home-btn:hover {
            background: var(--primary-orange);
            color: var(--bg-color);
            transform: translateX(-5px);
            box-shadow: 0 5px 15px var(--orange-glow);
        }

        .login-container {
            background-color: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 90%;
            max-width: 420px;
            margin: 60px auto;
            padding: 40px 35px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);

            opacity: 0;
            transform: translateY(50px) scale(0.95);
            transition: all 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .login-container.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .logo {
            width: 140px;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }

        .header h1 {
            color: var(--text-white);
            font-size: 26px;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .header p {
            color: var(--text-light);
            font-size: 14px;
        }

        .role {
            text-align: start;
            font-weight: 600;
            margin-top: 20px;
            margin-bottom: 10px;
            color: var(--text-white);
            font-size: 0.95rem;
        }

        .role-selector {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            padding: 5px;
        }

        .role-btn {
            flex: 1;
            padding: 12px 10px;
            border: none;
            background: transparent;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-radius: 8px;
        }

        .role-btn:hover {
            color: var(--text-white);
        }

        .role-btn.active {
            background: var(--primary-orange);
            color: var(--bg-color);
            box-shadow: 0 4px 10px var(--orange-glow);
        }

        .input-group {
            margin-bottom: 18px;
            position: relative;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-light);
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-box {
            position: relative;
        }

        .input-box input {
            width: 100%;
            padding: 14px 15px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-light);
            border-radius: 10px;
            font-size: 15px;
            color: var(--text-white);
            outline: none;
            transition: all 0.3s ease;
        }

        .input-box input::placeholder {
            color: rgba(204, 214, 246, 0.4);
        }

        .input-box input:focus {
            border-color: var(--primary-orange);
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(255, 115, 0, 0.15);
        }

        .input-box input.invalid {
            border-color: var(--error-red);
        }

        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            cursor: pointer;
            transition: 0.2s;
        }

        .eye-icon:hover {
            color: var(--primary-orange);
        }

        .error-msg {
            color: var(--error-red);
            font-size: 12px;
            margin-top: 6px;
            display: none;
            font-weight: 500;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-light);
            cursor: pointer;
            font-weight: 500;
        }

        .remember-me input {
            accent-color: var(--primary-orange);
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        .forgot-pwd {
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .forgot-pwd:hover {
            color: var(--text-white);
            text-decoration: underline;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-orange);
            color: var(--bg-color);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(9, 111, 8, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(10, 142, 14, 0.4);
            background-color: #16a34a;
        }

        .social-login {
            text-align: center;
            margin-top: 30px;
        }

        .social-login p {
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 20px;
            position: relative;
        }

        .social-login p::before,
        .social-login p::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 28%;
            height: 1px;
            background: var(--border-light);
        }

        .social-login p::before {
            left: 0;
        }

        .social-login p::after {
            right: 0;
        }

        .icons-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .social-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid var(--border-light);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-white);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        .social-icon:hover {
            background-color: var(--primary-orange);
            color: var(--bg-color);
            border-color: var(--primary-orange);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px var(--orange-glow);
        }

        .create-account {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-light);
        }

        .create-account a {
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: 700;
            margin-left: 5px;
            transition: color 0.3s ease;
        }

        .create-account a:hover {
            color: var(--text-white);
            text-decoration: underline;
        }

        @media screen and (max-width: 480px) {
            .login-container {
                padding: 35px 25px;
                margin: 80px auto 20px auto;
                width: 92%;
            }

            .header h1 {
                font-size: 24px;
            }

            .back-home-btn {
                top: 15px;
                left: 15px;
                padding: 8px 15px;
                font-size: 13px;
                background: rgba(10, 25, 47, 0.9);
            }

            .role-btn {
                padding: 10px;
                font-size: 0.95rem;
            }
        }

        @media screen and (max-width: 768px) {
            .back-home-btn {
                position: relative;
                top: 0;
                left: 0;
                margin: 20px 0 0 5%;
                padding: 8px 15px;
                font-size: 13px;
                background: rgba(10, 25, 47, 0.9);
                display: inline-flex;
            }

            .login-container {
                padding: 35px 25px;
                margin: 30px auto 40px auto;
                width: 92%;
            }

            .header h1 {
                font-size: 24px;
            }

            .role-btn {
                padding: 10px;
                font-size: 0.95rem;
            }
        }
    </style>
</head>

<body>

    <div class="video-wrapper">
        <video autoplay loop muted playsinline>
            <source src="./asset/q4.mp4" type="video/mp4">
        </video>
    </div>
    <div class="overlay"></div>

    <a href="index.html" class="back-home-btn">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <div class="login-container" id="loginBox">

        <div class="header">
            <a href="index.html">
                <img src="./asset/Greenlogo.webp" alt="Agency Logo" class="logo">
            </a>
            <h1>Welcome to the Portal</h1>
            <p>Sign in to access your dashboard</p>
        </div>

        <p class="role">Select your Role</p>

        <div class="role-selector">
            <button class="role-btn active" onclick="setRole('admin', this)">
                <i class="fa-solid fa-user-shield"></i> Admin
            </button>
            <button class="role-btn" onclick="setRole('client', this)">
                <i class="fa-solid fa-user-tie"></i> Client
            </button>
        </div>

        <form id="loginForm" onsubmit="validateForm(event)">

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-box">
                    <input type="text" id="email" placeholder="hello@example.com">
                </div>
                <div class="error-msg" id="emailError">Invalid email address format</div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-box">
                    <input type="password" id="password" placeholder="Enter your password">
                    <i class="fa-regular fa-eye eye-icon" id="togglePassword" onclick="toggleVisibility()"></i>
                </div>
                <div class="error-msg" id="passwordError">Password must be at least 6 characters</div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember">
                    Remember me
                </label>
                <a href="404.html" class="forgot-pwd">Forgot Password?</a>
            </div>

            <button type="submit" class="submit-btn" id="loginBtnText">Admin Login</button>
        </form>

        <div class="social-login">
            <p>Or connect with</p>
            <div class="icons-container">
                <a href="404.html" class="social-icon"><i class="fa-brands fa-google"></i></a>
                <a href="404.html" class="social-icon"><i class="fa-brands fa-facebook-f"></i></a>
                <a href="404.html" class="social-icon"><i class="fa-brands fa-twitter"></i></a>
                <a href="404.html" class="social-icon"><i class="fa-brands fa-linkedin-in"></i></a>
            </div>
        </div>

        <div class="create-account">
            Don't have an account? <a href="creat.html">Create Account</a>
        </div>

    </div>

    <script>
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loginBox').classList.add('show');
            }, 150);
        };

        let currentRole = 'admin';
        function setRole(role, btnElement) {
            currentRole = role;

            let buttons = document.querySelectorAll('.role-btn');
            buttons.forEach(btn => btn.classList.remove('active'));

            btnElement.classList.add('active');

            const loginButtonText = document.getElementById('loginBtnText');
            if (role === 'admin') {
                loginButtonText.innerText = 'Admin Login';
            } else if (role === 'client') {
                loginButtonText.innerText = 'Client Login';
            }
        }

        function toggleVisibility() {
            const pwdInput = document.getElementById('password');
            const eyeIcon = document.getElementById('togglePassword');

            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            } else {
                pwdInput.type = 'password';
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            }
        }

        function validateForm(e) {
            e.preventDefault();

            let isValid = true;

            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const emailError = document.getElementById('emailError');
            const passwordError = document.getElementById('passwordError');

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

            if (!emailRegex.test(emailInput.value)) {
                emailInput.classList.add('invalid');
                emailError.style.display = 'block';
                isValid = false;
            } else {
                emailInput.classList.remove('invalid');
                emailError.style.display = 'none';
            }

            if (passwordInput.value.length < 6) {
                passwordInput.classList.add('invalid');
                passwordError.style.display = 'block';
                isValid = false;
            } else {
                passwordInput.classList.remove('invalid');
                passwordError.style.display = 'none';
            }

            if (isValid) {
                localStorage.setItem('UserMail', emailInput.value);

                if (currentRole === 'admin') {
                    window.location.href = 'admin.html';
                } else if (currentRole === 'client') {
                    window.location.href = 'client.html';
                }
            }
        }
    </script>
</body>

</html>
